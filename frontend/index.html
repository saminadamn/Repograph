<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RepoGraph — Visualizer</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --border: #1f2937;
    --accent: #6366f1;
    --accent2: #10b981;
    --text: #e2e8f0;
    --muted: #64748b;
    --node-color: #6366f1;
    --edge-color: #334155;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--text); font-family: 'JetBrains Mono', 'Fira Code', monospace; }

  header {
    padding: 16px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--surface);
  }
  .logo { font-size: 18px; font-weight: 700; color: var(--accent); }
  .tagline { font-size: 12px; color: var(--muted); }

  .layout { display: flex; height: calc(100vh - 57px); }

  .sidebar {
    width: 340px;
    min-width: 340px;
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .sidebar-section { padding: 16px; border-bottom: 1px solid var(--border); }
  .sidebar-section h3 { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); margin-bottom: 10px; }

  input, textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    padding: 8px 12px;
    font-size: 13px;
    font-family: inherit;
    outline: none;
    transition: border-color 0.2s;
  }
  input:focus, textarea:focus { border-color: var(--accent); }

  button {
    background: var(--accent);
    color: white;
    border: none;
    border-radius: 6px;
    padding: 8px 16px;
    font-size: 13px;
    font-family: inherit;
    cursor: pointer;
    width: 100%;
    margin-top: 8px;
    transition: opacity 0.2s;
  }
  button:hover { opacity: 0.85; }
  button.secondary { background: var(--border); color: var(--text); }
  button:disabled { opacity: 0.4; cursor: not-allowed; }

  .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
  .stat-card {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 10px;
  }
  .stat-card .val { font-size: 20px; font-weight: 700; color: var(--accent2); }
  .stat-card .label { font-size: 10px; color: var(--muted); margin-top: 2px; }

  .savings-banner {
    background: rgba(16, 185, 129, 0.1);
    border: 1px solid rgba(16, 185, 129, 0.3);
    border-radius: 6px;
    padding: 10px;
    font-size: 12px;
    color: var(--accent2);
    margin-top: 8px;
  }

  .node-list { flex: 1; overflow-y: auto; padding: 0; }
  .node-item {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.1s;
    font-size: 12px;
  }
  .node-item:hover { background: rgba(99, 102, 241, 0.1); }
  .node-item.selected { background: rgba(99, 102, 241, 0.2); border-left: 2px solid var(--accent); }
  .node-path { color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .node-meta { color: var(--muted); font-size: 11px; margin-top: 2px; }

  .canvas-area { flex: 1; position: relative; overflow: hidden; }
  canvas { display: block; }

  .node-detail {
    position: absolute;
    top: 16px;
    right: 16px;
    width: 280px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px;
    font-size: 12px;
    display: none;
  }
  .node-detail.visible { display: block; }
  .node-detail h4 { color: var(--accent); margin-bottom: 10px; word-break: break-all; }
  .node-detail .row { margin: 4px 0; }
  .node-detail .key { color: var(--muted); }
  .node-detail .funcs { 
    margin-top: 8px; 
    max-height: 120px; 
    overflow-y: auto;
    background: var(--bg);
    border-radius: 4px;
    padding: 6px;
  }
  .func-tag {
    display: inline-block;
    background: rgba(99,102,241,0.15);
    color: var(--accent);
    border-radius: 3px;
    padding: 1px 5px;
    margin: 2px;
    font-size: 10px;
  }

  .status-bar {
    position: absolute;
    bottom: 16px;
    left: 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 6px 12px;
    font-size: 11px;
    color: var(--muted);
  }

  .loading {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(10,14,26,0.8);
    font-size: 14px;
    color: var(--accent);
    display: none;
  }
  .loading.visible { display: flex; }

  /* Spinner */
  @keyframes spin { to { transform: rotate(360deg); } }
  .spinner {
    width: 20px; height: 20px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-right: 10px;
  }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo">⬡ RepoGraph</div>
    <div class="tagline">Graph-based repo context — 50-70% fewer LLM tokens</div>
  </div>
</header>

<div class="layout">
  <div class="sidebar">
    <div class="sidebar-section">
      <h3>Analyze Repository</h3>
      <input type="text" id="repoUrl" placeholder="https://github.com/user/repo" />
      <button id="analyzeBtn">Build Graph</button>
    </div>

    <div class="sidebar-section" id="statsSection" style="display:none">
      <h3>Graph Stats</h3>
      <div class="stats">
        <div class="stat-card"><div class="val" id="nodeCount">-</div><div class="label">Files</div></div>
        <div class="stat-card"><div class="val" id="edgeCount">-</div><div class="label">Dependencies</div></div>
        <div class="stat-card"><div class="val" id="fullTokens">-</div><div class="label">Full Tokens</div></div>
        <div class="stat-card"><div class="val" id="compression">-</div><div class="label">Compression</div></div>
      </div>
      <div class="savings-banner" id="savingsBanner"></div>
    </div>

    <div class="sidebar-section" id="querySection" style="display:none">
      <h3>Query Context</h3>
      <input type="text" id="queryInput" placeholder="how does auth work?" />
      <button id="queryBtn">Get Smart Context</button>
    </div>

    <div class="node-list" id="nodeList"></div>
  </div>

  <div class="canvas-area">
    <canvas id="graphCanvas"></canvas>
    <div class="node-detail" id="nodeDetail">
      <h4 id="detailPath"></h4>
      <div class="row"><span class="key">Language: </span><span id="detailLang"></span></div>
      <div class="row"><span class="key">Size: </span><span id="detailSize"></span></div>
      <div class="row"><span class="key">Functions: </span><span id="detailFnCount"></span></div>
      <div class="row"><span class="key">Classes: </span><span id="detailClsCount"></span></div>
      <div class="funcs" id="detailFuncs"></div>
    </div>
    <div class="status-bar" id="statusBar">Ready. Enter a GitHub repo URL to start.</div>
    <div class="loading" id="loadingOverlay"><div class="spinner"></div><span id="loadingText">Analyzing...</span></div>
  </div>
</div>

<script>
const API = 'http://localhost:8000';
let graphData = null;
let graphId = null;
let selectedNode = null;
let highlightedNodes = new Set();

// Canvas setup
const canvas = document.getElementById('graphCanvas');
const ctx = canvas.getContext('2d');
let nodes = [], edges = [], nodeMap = {};
let transform = { x: 0, y: 0, scale: 1 };
let dragging = false, dragStart = null, dragOffset = null;
let animationId;

function resizeCanvas() {
  const area = canvas.parentElement;
  canvas.width = area.clientWidth;
  canvas.height = area.clientHeight;
  drawGraph();
}
window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// --- Force-directed layout ---
function initLayout(graphJson) {
  const nodeEntries = Object.entries(graphJson.nodes);
  const w = canvas.width, h = canvas.height;
  
  nodes = nodeEntries.map(([id, data], i) => ({
    id,
    x: Math.random() * w * 0.8 + w * 0.1,
    y: Math.random() * h * 0.8 + h * 0.1,
    vx: 0, vy: 0,
    data,
    radius: 5 + Math.min((data.functions?.length || 0) * 0.5, 12)
  }));
  
  nodeMap = {};
  nodes.forEach(n => nodeMap[n.id] = n);

  edges = graphJson.edges.map(e => ({
    source: nodeMap[e.source],
    target: nodeMap[e.target],
    weight: e.weight
  })).filter(e => e.source && e.target);

  runForceLayout(80);
}

function runForceLayout(iterations) {
  for (let i = 0; i < iterations; i++) {
    // Repulsion
    for (let a = 0; a < nodes.length; a++) {
      for (let b = a + 1; b < nodes.length; b++) {
        const na = nodes[a], nb = nodes[b];
        const dx = nb.x - na.x, dy = nb.y - na.y;
        const dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
        const force = 3000 / (dist * dist);
        const fx = (dx/dist) * force, fy = (dy/dist) * force;
        na.vx -= fx; na.vy -= fy;
        nb.vx += fx; nb.vy += fy;
      }
    }
    // Attraction along edges
    for (const e of edges) {
      const dx = e.target.x - e.source.x;
      const dy = e.target.y - e.source.y;
      const dist = Math.sqrt(dx*dx + dy*dy) || 0.01;
      const force = (dist - 100) * 0.02;
      const fx = (dx/dist) * force, fy = (dy/dist) * force;
      e.source.vx += fx; e.source.vy += fy;
      e.target.vx -= fx; e.target.vy -= fy;
    }
    // Center gravity
    const cx = canvas.width/2, cy = canvas.height/2;
    for (const n of nodes) {
      n.vx += (cx - n.x) * 0.005;
      n.vy += (cy - n.y) * 0.005;
      n.x += n.vx * 0.6;
      n.y += n.vy * 0.6;
      n.vx *= 0.8;
      n.vy *= 0.8;
    }
  }
  drawGraph();
}

function drawGraph() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  ctx.save();
  ctx.translate(transform.x, transform.y);
  ctx.scale(transform.scale, transform.scale);

  // Edges
  for (const e of edges) {
    if (!e.source || !e.target) continue;
    const isHighlighted = highlightedNodes.has(e.source.id) || highlightedNodes.has(e.target.id);
    ctx.beginPath();
    ctx.moveTo(e.source.x, e.source.y);
    ctx.lineTo(e.target.x, e.target.y);
    ctx.strokeStyle = isHighlighted ? 'rgba(99,102,241,0.5)' : 'rgba(51,65,85,0.4)';
    ctx.lineWidth = isHighlighted ? 1.5 : 0.8;
    ctx.stroke();
  }

  // Nodes
  for (const n of nodes) {
    const isSelected = selectedNode?.id === n.id;
    const isHighlighted = highlightedNodes.has(n.id);
    const r = n.radius;

    ctx.beginPath();
    ctx.arc(n.x, n.y, r, 0, Math.PI * 2);
    
    if (isSelected) {
      ctx.fillStyle = '#f59e0b';
    } else if (isHighlighted) {
      ctx.fillStyle = '#10b981';
    } else {
      ctx.fillStyle = '#6366f1';
    }
    ctx.fill();

    // Outline
    ctx.strokeStyle = isSelected ? '#fbbf24' : (isHighlighted ? '#34d399' : 'rgba(99,102,241,0.3)');
    ctx.lineWidth = isSelected ? 2 : 1;
    ctx.stroke();

    // Label for larger nodes
    if (r > 6 || isSelected || isHighlighted) {
      const label = n.id.split('/').pop();
      ctx.fillStyle = isSelected ? '#fef3c7' : (isHighlighted ? '#d1fae5' : '#94a3b8');
      ctx.font = `${Math.max(9, r)}px monospace`;
      ctx.fillText(label, n.x + r + 2, n.y + 4);
    }
  }

  ctx.restore();
}

// Canvas interaction
canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.clientX, y: e.clientY };
  dragOffset = { ...transform };
});
canvas.addEventListener('mousemove', e => {
  if (!dragging) return;
  transform.x = dragOffset.x + (e.clientX - dragStart.x);
  transform.y = dragOffset.y + (e.clientY - dragStart.y);
  drawGraph();
});
canvas.addEventListener('mouseup', () => { dragging = false; });
canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY < 0 ? 1.1 : 0.9;
  transform.scale *= factor;
  drawGraph();
}, { passive: false });

canvas.addEventListener('click', e => {
  if (Math.abs(e.movementX) + Math.abs(e.movementY) > 3) return;
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left - transform.x) / transform.scale;
  const my = (e.clientY - rect.top - transform.y) / transform.scale;
  
  for (const n of nodes) {
    const dx = mx - n.x, dy = my - n.y;
    if (Math.sqrt(dx*dx + dy*dy) <= n.radius + 5) {
      selectNode(n);
      return;
    }
  }
  selectedNode = null;
  document.getElementById('nodeDetail').classList.remove('visible');
  drawGraph();
});

function selectNode(n) {
  selectedNode = n;
  const detail = document.getElementById('nodeDetail');
  detail.classList.add('visible');
  document.getElementById('detailPath').textContent = n.id;
  document.getElementById('detailLang').textContent = n.data.language;
  document.getElementById('detailSize').textContent = `${(n.data.size_bytes/1024).toFixed(1)} KB`;
  document.getElementById('detailFnCount').textContent = n.data.functions?.length || 0;
  document.getElementById('detailClsCount').textContent = n.data.classes?.length || 0;
  const funcsEl = document.getElementById('detailFuncs');
  const allSymbols = [...(n.data.functions || []), ...(n.data.classes || []).map(c => `class ${c}`)];
  funcsEl.innerHTML = allSymbols.map(f => `<span class="func-tag">${f}</span>`).join('');
  
  // Highlight connected nodes
  highlightedNodes = new Set([n.id]);
  for (const e of edges) {
    if (e.source?.id === n.id) highlightedNodes.add(e.target?.id);
    if (e.target?.id === n.id) highlightedNodes.add(e.source?.id);
  }
  drawGraph();
}

// --- API Calls ---
async function analyzeRepo() {
  const url = document.getElementById('repoUrl').value.trim();
  if (!url) return alert('Enter a GitHub repo URL');
  
  setLoading(true, 'Cloning and analyzing repo...');
  
  try {
    const res = await fetch(`${API}/analyze`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ repo_url: url })
    });
    const data = await res.json();
    if (!res.ok) throw new Error(data.detail || 'Analysis failed');
    
    graphId = data.graph_id;
    setStatus(`Graph built: ${data.node_count} files, ${data.edge_count} deps | ID: ${graphId}`);

    // Fetch full graph for visualization
    const gRes = await fetch(`${API}/graph/${graphId}`);
    graphData = await gRes.json();
    initLayout(graphData);
    renderNodeList(graphData);
    
    // Show stats
    document.getElementById('statsSection').style.display = 'block';
    document.getElementById('querySection').style.display = 'block';
    document.getElementById('nodeCount').textContent = data.node_count;
    document.getElementById('edgeCount').textContent = data.edge_count;
    
    const savRes = await fetch(`${API}/savings/${graphId}`);
    const sav = await savRes.json();
    document.getElementById('fullTokens').textContent = (sav.full_repo_tokens/1000).toFixed(0) + 'K';
    document.getElementById('compression').textContent = sav.compression_ratio;
    document.getElementById('savingsBanner').textContent =
      `💰 ${sav.savings_per_100_queries} saved per 100 queries vs full-repo injection`;
    
  } catch (err) {
    alert(`Error: ${err.message}\n\nMake sure the API server is running on localhost:8000`);
  }
  setLoading(false);
}

async function queryGraph() {
  if (!graphId) return alert('Analyze a repo first');
  const q = document.getElementById('queryInput').value.trim();
  if (!q) return alert('Enter a query');
  
  setLoading(true, 'Finding relevant files...');
  try {
    const res = await fetch(`${API}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ graph_id: graphId, query: q })
    });
    const data = await res.json();
    
    // Highlight relevant nodes on graph
    highlightedNodes = new Set(data.nodes_included);
    drawGraph();
    
    setStatus(`Query: ${data.nodes_included.length} files selected | ${data.estimated_tokens.toLocaleString()} tokens | ${(data.compression_ratio*100).toFixed(0)}% compression`);
    
    // Copy context to clipboard
    navigator.clipboard.writeText(data.context).then(() => {
      alert(`✅ Context copied to clipboard!\n\n${data.savings_summary}`);
    });
    
    // Highlight in sidebar
    document.querySelectorAll('.node-item').forEach(el => {
      el.classList.toggle('selected', data.nodes_included.includes(el.dataset.id));
    });
    
  } catch (err) {
    alert(`Error: ${err.message}`);
  }
  setLoading(false);
}

function renderNodeList(graph) {
  const list = document.getElementById('nodeList');
  list.innerHTML = '';
  const sorted = Object.entries(graph.nodes).sort((a, b) => 
    (b[1].functions?.length || 0) - (a[1].functions?.length || 0)
  );
  sorted.forEach(([id, data]) => {
    const el = document.createElement('div');
    el.className = 'node-item';
    el.dataset.id = id;
    el.innerHTML = `
      <div class="node-path">${id}</div>
      <div class="node-meta">${data.language} · ${data.functions?.length || 0} fns · ${data.classes?.length || 0} cls</div>
    `;
    el.onclick = () => {
      const n = nodeMap[id];
      if (n) selectNode(n);
    };
    list.appendChild(el);
  });
}

function setLoading(show, text = '') {
  const el = document.getElementById('loadingOverlay');
  el.classList.toggle('visible', show);
  if (text) document.getElementById('loadingText').textContent = text;
}

function setStatus(msg) {
  document.getElementById('statusBar').textContent = msg;
}

document.getElementById('analyzeBtn').onclick = analyzeRepo;
document.getElementById('queryBtn').onclick = queryGraph;
document.getElementById('repoUrl').addEventListener('keydown', e => { if (e.key === 'Enter') analyzeRepo(); });
</script>
</body>
</html>
